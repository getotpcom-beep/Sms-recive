<!DOCTYPE html>
 <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus OTP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  padding: 15px;
  padding-bottom: 80px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
}

.number-box {
  display: flex;
  justify-content: space-between;
  background: #1a1a1a;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
}

button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  background: #333;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

.page { display: none; }
.page.active { display: block; }

.bottom-nav {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  background: #1a1a1a;
  display: flex;
  justify-content: space-around;
  border-radius: 20px;
  padding: 10px 0;
}

.nav-item {
  text-align: center;
  color: #aaa;
  font-size: 12px;
}

.nav-item span { font-size: 20px; }
.nav-item.active { color: white; }
</style>
</head>

<body>

<div class="container">

<h2>Nexus OTP</h2>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <h1>OTP Numbers</h1>
  <div id="numbersList"></div>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
  <h1>Select Plan</h1>

  <div class="card">
    <h3>₹99 Plan</h3>
    <p>10 OTP</p>
    <button onclick="showQR(99)">Buy</button>
  </div>

  <div class="card">
    <h3>₹200 Plan</h3>
    <p>25 OTP</p>
    <button onclick="showQR(200)">Buy</button>
  </div>

  <div class="card">
    <h3>₹300 Plan</h3>
    <p>Unlimited OTP</p>
    <button onclick="showQR(300)">Buy</button>
  </div>

  <!-- QR BOX -->
  <div class="card" id="qrBox" style="display:none;">
    <h3>Scan & Pay</h3>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay" width="200">
    
    <input type="text" id="txid" placeholder="Transaction ID">
    <button onclick="submitPayment()">Submit Payment</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
  <h1>Settings</h1>
  <div class="card">
    <input type="text" placeholder="Name">
    <button>Save</button>
  </div>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showPage('dashboard')">
    <span>🏠</span>
    <p>Dashboard</p>
  </div>

  <div class="nav-item" onclick="showPage('deposit')">
    <span>💳</span>
    <p>Deposit</p>
  </div>

  <div class="nav-item" onclick="showPage('settings')">
    <span>⚙️</span>
    <p>Settings</p>
  </div>
</div>

<script>
// PAGE SWITCH
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  document.getElementById(pageId).classList.add('active');

  let index = {dashboard:0, deposit:1, settings:2};
  document.querySelectorAll('.nav-item')[index[pageId]].classList.add('active');
}

// 200+ NUMBERS
let list = document.getElementById("numbersList");

for(let i=0; i<200; i++){
  let num = "+91 9" + Math.floor(100000000 + Math.random()*900000000);

  let div = document.createElement("div");
  div.className = "number-box";

  div.innerHTML = `
    <span>${num}</span>
    <button onclick="getOtp()">Get OTP</button>
  `;

  list.appendChild(div);
}

// OTP CLICK
function getOtp(){
  alert("Deposit Required");
  showPage('deposit');
}

// PLAN + QR
let selectedPlan = "";

function showQR(price){
  selectedPlan = price;
  document.getElementById("qrBox").style.display = "block";
  alert("Plan ₹" + price + " selected. Scan QR");
}

// PAYMENT
function submitPayment(){
  let txid = document.getElementById("txid").value;

  if(txid=="" || selectedPlan==""){
    alert("Enter TXID & select plan");
    return;
  }

  alert("Payment Submitted ✅ Plan ₹" + selectedPlan);

  document.getElementById("txid").value = "";
  document.getElementById("qrBox").style.display = "none";

  showPage('dashboard');
}
</script>

</body>
</html>
