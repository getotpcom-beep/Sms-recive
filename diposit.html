<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus OTP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* container */
.container {
  padding: 15px;
  padding-bottom: 80px;
}

/* heading */
h2 {
  text-align:center;
}

/* cards */
.card {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
}

/* numbers */
.number-box {
  display:flex;
  justify-content:space-between;
  background:#1c1c1c;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
}

/* buttons */
button {
  border:none;
  padding:8px 12px;
  border-radius:8px;
  background:#00c853;
  color:white;
}

/* pages */
.page {display:none;}
.page.active {display:block;}

/* bottom nav */
.bottom-nav {
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  background:#1c1c1c;
  display:flex;
  justify-content:space-around;
  border-radius:20px;
  padding:10px 0;
}

.nav-item {
  text-align:center;
  color:#aaa;
}
.nav-item.active {color:#00c853;}

/* plans */
.plan {
  background: linear-gradient(145deg,#1f1f1f,#111);
  padding:20px;
  border-radius:20px;
  margin-top:15px;
  text-align:center;
}

.plan h2 {color:#00ff99;}

.plan button {
  width:100%;
  margin-top:10px;
}

/* QR popup */
#qrPopup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.popup {
  background:#121212;
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:320px;
}

.qr {
  width:200px;
  margin:15px 0;
  border-radius:10px;
}

input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
  margin-top:10px;
}

.pay {background:#00c853; width:100%; margin-top:10px;}
.cancel {background:red; width:100%; margin-top:8px;}
</style>
</head>

<body>

<div class="container">

<h2>Nexus OTP</h2>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <h3>OTP Numbers</h3>
  <div id="numbersList"></div>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
  <h3 style="text-align:center;">Choose Plan</h3>

  <div class="plan">
    <h2>₹99</h2>
    <p>10 OTP</p>
    <button onclick="openQR(99)">Buy Now</button>
  </div>

  <div class="plan">
    <h2>₹200</h2>
    <p>25 OTP</p>
    <button onclick="openQR(200)">Buy Now</button>
  </div>

  <div class="plan">
    <h2>₹300</h2>
    <p>Unlimited OTP</p>
    <button onclick="openQR(300)">Buy Now</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
  <h3>Settings</h3>
  <div class="card">
    <input type="text" placeholder="Name">
    <button style="margin-top:10px;">Save</button>
  </div>
</div>

</div>

<!-- QR POPUP -->
<div id="qrPopup">
  <div class="popup">
    <h3>Scan & Pay</h3>

    <!-- 🔥 TERA QR -->
    <img src="ankushkumar.jpg" class="qr">

    <input type="text" id="txid" placeholder="Enter Transaction ID">

    <button class="pay" onclick="submitPayment()">Submit</button>
    <button class="cancel" onclick="closeQR()">Cancel</button>
  </div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showPage('dashboard')">🏠<br>Home</div>
  <div class="nav-item" onclick="showPage('deposit')">💳<br>Deposit</div>
  <div class="nav-item" onclick="showPage('settings')">⚙️<br>Settings</div>
</div>

<script>
// page switch
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

  document.getElementById(page).classList.add('active');

  let index={dashboard:0,deposit:1,settings:2};
  document.querySelectorAll('.nav-item')[index[page]].classList.add('active');
}

// numbers generate
let list=document.getElementById("numbersList");

for(let i=0;i<200;i++){
  let num="+91 9"+Math.floor(100000000+Math.random()*900000000);

  let div=document.createElement("div");
  div.className="number-box";

  div.innerHTML=`<span>${num}</span>
  <button onclick="getOtp()">Get OTP</button>`;

  list.appendChild(div);
}

// OTP click
function getOtp(){
  showPage('deposit');
}

// QR open
function openQR(price){
  document.getElementById("qrPopup").style.display="flex";
}

// close QR
function closeQR(){
  document.getElementById("qrPopup").style.display="none";
}

// submit payment
function submitPayment(){
  let txid=document.getElementById("txid").value;

  if(txid==""){
    alert("Enter TXID");
    return;
  }

  alert("Payment Submitted ✅");

  document.getElementById("txid").value="";
  closeQR();
  showPage('dashboard');
}
</script>

</body>
</html>
